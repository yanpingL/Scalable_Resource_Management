events {
    worker_connections 4096;
}

http {
    log_format upstream_debug '$remote_addr - $request '
                              'status=$status upstream=$upstream_addr';

    upstream backend {
        server web1:8080;
        server web2:8080;
    }

    upstream object_storage {
        server minio:9000;
    }

    server {
        listen 80;
        client_max_body_size 100m;
        access_log /var/log/nginx/access.log upstream_debug;

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            add_header X-Upstream-Addr $upstream_addr always;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            add_header X-Upstream-Addr $upstream_addr always;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webserver-files/ {
            proxy_pass http://object_storage;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
