name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker environment
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: webserver-web-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run C++ unit tests
        run: |
          docker run --rm webserver-web-dev:latest \
            bash -lc "cd /workspace && cmake --build build --target unit_tests --parallel 1 && ctest --test-dir build --output-on-failure"

      - name: Clean up Docker environment
        if: always()
        run: docker compose down -v
