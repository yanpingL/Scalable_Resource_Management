name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker environment
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          load: true
          tags: webserver-web-dev:latest
          cache-from: type=gha,scope=backend-arm64-ci
          cache-to: type=gha,scope=backend-arm64-ci,mode=max

      - name: Run C++ unit tests
        run: docker run --rm webserver-web-dev:latest ./build/bin/unit_tests

      - name: Clean up Docker environment
        if: always()
        run: docker compose down -v
