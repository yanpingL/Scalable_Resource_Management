name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "db/**"
      - "scripts/**"
      - "tests/**"
      - "vcpkg-triplets/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - ".dockerignore"
      - "ecs-task-definition.json"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: webserver-backend
  ECS_TASK_DEFINITION: ecs-task-definition.json
  ECS_CONTAINER_NAME: webserver-backend
  ECS_DESIRED_COUNT: 2

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-24.04-arm
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha,scope=backend-arm64
          cache-to: type=gha,scope=backend-arm64,mode=max

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Register ECS task definition
        id: register-task-definition
        run: |
          task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.render-task-definition.outputs.task-definition }}" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"
          echo "task-definition-arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        id: run-migrations
        env:
          TASK_DEFINITION_ARN: ${{ steps.register-task-definition.outputs.task-definition-arn }}
        run: |
          network_configuration="$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}" \
            --query "services[0].networkConfiguration" \
            --output json)"

          cat > migration-overrides.json <<EOF
          {
            "containerOverrides": [
              {
                "name": "${ECS_CONTAINER_NAME}",
                "command": ["./scripts/run_migrations.sh"]
              }
            ]
          }
          EOF

          migration_task_arn="$(aws ecs run-task \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --launch-type FARGATE \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --network-configuration "${network_configuration}" \
            --overrides file://migration-overrides.json \
            --query "tasks[0].taskArn" \
            --output text)"

          if [ -z "${migration_task_arn}" ] || [ "${migration_task_arn}" = "None" ]; then
            echo "Failed to start migration task" >&2
            exit 1
          fi

          echo "task-arn=${migration_task_arn}" >> "${GITHUB_OUTPUT}"

      - name: Wait for database migrations
        env:
          MIGRATION_TASK_ARN: ${{ steps.run-migrations.outputs.task-arn }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --tasks "${MIGRATION_TASK_ARN}"

          exit_code="$(aws ecs describe-tasks \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --tasks "${MIGRATION_TASK_ARN}" \
            --query "tasks[0].containers[?name=='${ECS_CONTAINER_NAME}'].exitCode | [0]" \
            --output text)"

          stopped_reason="$(aws ecs describe-tasks \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --tasks "${MIGRATION_TASK_ARN}" \
            --query "tasks[0].stoppedReason" \
            --output text)"

          if [ "${exit_code}" != "0" ]; then
            echo "Migration task failed with exit code ${exit_code}" >&2
            echo "Stopped reason: ${stopped_reason}" >&2
            exit 1
          fi

      - name: Deploy ECS service
        env:
          TASK_DEFINITION_ARN: ${{ steps.register-task-definition.outputs.task-definition-arn }}
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --desired-count "${ECS_DESIRED_COUNT}" \
            --no-cli-pager

          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"
