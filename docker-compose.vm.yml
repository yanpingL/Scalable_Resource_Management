services:
  web1:
    build:
      context: .
      dockerfile: Dockerfile
    image: webserver-backend-vm:latest
    container_name: vm-web-1
    restart: unless-stopped
    env_file:
      - ${VM_ENV_FILE:-.env.vm}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_ENABLED: true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    image: webserver-backend-vm:latest
    container_name: vm-web-2
    restart: unless-stopped
    env_file:
      - ${VM_ENV_FILE:-.env.vm}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_ENABLED: true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: vm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/vm/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2

  postgres:
    image: postgres:16
    container_name: vm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: vm-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  minio:
    image: minio/minio:latest
    container_name: vm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: vm-minio-init
    profiles: ["init"]
    depends_on:
      - minio
    environment:
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing "local/$${S3_BUCKET}"

  migrations:
    image: webserver-backend-vm:latest
    container_name: vm-migrations
    profiles: ["init"]
    env_file:
      - ${VM_ENV_FILE:-.env.vm}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./scripts/run_migrations.sh"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
